<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=Claw_v3_%E6%95%99%E5%AD%B8%E7%B0%A1%E5%A0%B1.html">
    <link rel="canonical" href="Claw_v3_%E6%95%99%E5%AD%B8%E7%B0%A1%E5%A0%B1.html">
    <title>🦞 Claw v3 — 教學簡報</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #2D2D2D 0%, #1A1A1A 100%);
            color: white;
        }
        .loader {
            text-align: center;
            padding: 40px;
        }
        .loader .lobster {
            font-size: 80px;
            animation: bounce 1.5s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .loader h1 {
            color: #E64B37;
            font-size: 42px;
            margin: 20px 0 10px;
        }
        .loader p {
            color: #ccc;
            font-size: 18px;
        }
        .loader a {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 28px;
            background: #E64B37;
            color: white;
            text-decoration: none;
            border-radius: 24px;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .loader a:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="loader">
        <div class="lobster">🦞</div>
        <h1>Claw v3</h1>
        <p>教學簡報載入中...</p>
        <a href="Claw_v3_%E6%95%99%E5%AD%B8%E7%B0%A1%E5%A0%B1.html">點此手動進入</a>
    </div>
    <script>
        // 雙保險: meta refresh 失敗時用 JS 跳轉
        setTimeout(function() {
            window.location.replace('Claw_v3_%E6%95%99%E5%AD%B8%E7%B0%A1%E5%A0%B1.html');
        }, 100);
    </script>
</body>
</html>
