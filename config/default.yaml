app:
  name: "LiangClaw"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  debug: false

persona:
  name: "阿亮老師"
  config_file: "config/personas/aliang.yaml"

models:
  default: "gemini-3-flash"
  fallback_chain:
    - "gemini-3-flash"
    - "llama-3.3-70b-versatile"
    - "gpt-5.4"

skills:
  search_paths:
    - "C:/Users/user/.claude/skills"
    - "skills/bundled"
  max_context_chars: 4000

session:
  storage_dir: "data/sessions"
  max_history: 50
  compact_after: 30
