<!-- Password Gate (SHA-256) -->
<div class="password-gate" id="passwordGate">
    <div class="gate-box">
        <div class="gate-logo">__EMOJI__</div>
        <div class="gate-title">__TITLE__</div>
        <div class="gate-subtitle">__SUBTITLE__</div>
        <p class="gate-disclaimer">__DISCLAIMER__</p>

        <div class="gate-input-wrap">
            <input type="password" class="gate-input" id="pwInput" placeholder="請輸入密碼..." autocomplete="off">
            <button class="gate-toggle-pw" id="togglePw" title="顯示/隱藏密碼">&#128065;</button>
        </div>
        <button class="gate-btn" id="pwSubmit">__BTN_TEXT__</button>
        <div class="gate-error" id="pwError"></div>

        <div class="gate-admin-toggle" id="adminToggle">&#128274; 管理員</div>
        <div class="admin-panel" id="adminPanel">
            <h4>密碼管理（需管理員密碼）</h4>
            <div class="gate-input-wrap" style="margin-bottom:12px;">
                <input type="password" class="gate-input" id="adminPwInput" placeholder="管理員密碼..." style="font-size:14px;padding:10px 16px;">
            </div>
            <div id="adminContent" style="display:none;">
                <ul class="admin-pw-list" id="pwList"></ul>
                <div class="admin-add-row">
                    <input type="text" id="newPwInput" placeholder="新增密碼...">
                    <button id="addPwBtn">新增</button>
                </div>
                <div class="admin-msg" id="adminMsg"></div>
                <button class="gate-btn" id="enterSiteBtn" style="margin-top:12px;font-size:14px;padding:10px;">進入網站</button>
            </div>
        </div>
    </div>
</div>
